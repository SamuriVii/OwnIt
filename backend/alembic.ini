
# Core Alembic settings, script location and environment setup
# The folder where migration versions (Python scripts) are stored
# Adds the current directory to sys.path to help find project modules
# Defines how multiple paths are separated (depends on Operating System)
# Placeholder URL overrided in env.py using project's Pydantic settings
[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url = driver://user:pass@localhost/dbname

# Automated tasks executed after a new migration file is generated
# Enable hooks to run third-party tools (like Ruff) on new migration files
# Type 'exec' means run an external command from the system path
# The executable name to call
# Arguments passed to Ruff to automatically fix linting issues in the migration
[post_write_hooks]
hooks = ruff
ruff.type = exec    
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Definition of logging components used by Alembic
[loggers]
keys = root,sqlalchemy,alembic

# Definition of where the logs should be sent (e.g., to the console)
[handlers]
keys = console

# Definition of how the log messages should be formatted
[formatters]
keys = generic

# General logging settings for the entire application
[logger_root]
level = WARNING
handlers = console
qualname =

# Logging settings for SQLAlchemy (shows SQL queries if level is set to INFO)
[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

# Logging settings for Alembic's own operations
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# Configuration for the console log output
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# Rules for how date, time, and log levels are displayed in the terminal
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
